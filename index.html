<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Light Meter Legal</title>
  <meta name="description" content="Light Meter privacy policy and support pages.">
  <style>
    :root {
      --bg: #0b0c0d;
      --panel: #141516;
      --text: #f4f1ea;
      --muted: #bdb7ac;
      --line: rgba(255,255,255,.12);
      --accent: #f1b75d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.62;
    }

    main {
      width: min(860px, calc(100% - 36px));
      margin: 0 auto;
      padding: 52px 0 80px;
    }

    .brand {
      color: var(--muted);
      letter-spacing: 0;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 { margin: 10px 0; font-size: clamp(34px, 7vw, 56px); line-height: 1.18; }
    p { color: var(--muted); }
    a { color: var(--accent); }

    .header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 28px;
      margin-bottom: 34px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin: 18px 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <div class="brand">Light Meter</div>
      <h1>Legal and Support</h1>
      <p>Standalone legal pages for the Light Meter iOS app.</p>
    </div>

    <div class="card">
      <p><a href="./privacy.html">Privacy Policy</a></p>
      <p><a href="./support.html">Support</a></p>
    </div>
  </main>
</body>
</html>
